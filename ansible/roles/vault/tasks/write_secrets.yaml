
- name: Vault | Write secrets
  community.hashi_vault.vault_write:
    url: "{{ vault_url }}"
    path: "{{ vault_infra_secrets_mount }}/data/{{ item.key }}"
    data:
      data: "{{ item.value }}"
    auth_method: token
    token: "{{ vault_token }}"
  loop: "{{ vault_secrets | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

