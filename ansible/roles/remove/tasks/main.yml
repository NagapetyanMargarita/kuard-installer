- name: Delete monitoring helm
  community.kubernetes.helm:
    name: monitoring
    state: absent
    namespace: "{{ monitoring_helm }}"

- name: Delete CRD kube-prometheus-stack
  kubernetes.core.k8s:
#    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: "{{ item }}"
    state: absent
  loop: "{{ crd_monitoring_items }}"

- name: Удаление пространства имен Kubernetes
  kubernetes.core.k8s:
    name: {{ remove_item }}
    api_version: v1
    kind: Namespace
    state: absent
  loop:
    - {{ monitoring_namespace }}
    - {{ kuard_namespace }}
  loop_control: remove_item