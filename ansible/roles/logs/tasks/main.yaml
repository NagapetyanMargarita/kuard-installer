- name: Monitoring | Create monitoring namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ logs_namespace }}"
    state: present

- name: Logs | Install Minio chart
  kubernetes.core.helm:
    name: "{{ minio_helm }}"
    chart_ref: minio/minio
    chart_version: "5.4.0"
    release_namespace: "{{ logs_namespace }}"
    create_namespace: true
    values: "{{ minio_values }}"
    wait: true
    wait_timeout: "360s"
  when: minio_enabled

- name: Logs | Install Loki chart
  kubernetes.core.helm:
    name: "{{ loki_helm }}"
    chart_ref: grafana/loki
    chart_version: "6.28.0"
    release_namespace: "{{ logs_namespace }}"
    create_namespace: true
    values: "{{ loki_values }}"
    wait: true
    wait_timeout: "160s"
  ignore_errors: true
  when: loki_enabled

- name: Monitoring | Install Fluent-bit
  kubernetes.core.helm:
    name: "{{ fluentbit_helm }}"
    chart_ref: fluent/fluent-bit
    chart_version: "0.56.0"
    release_namespace: "{{ logs_namespace }}"
    values: "{{ fluentbit_values }}"
    wait: true
    wait_timeout: "360s"
  when: fluent_bit_enabled