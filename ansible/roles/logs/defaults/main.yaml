logs_namespace: "logs"
minio_helm: "minio"
minio_endpoint: "minio.monitoring.svc.cluster.local:9000"
minio_root: minio
minio_password: minio123

loki_helm: "loki"
loki_s3_bucket_prefix: "loki"

fluentbit_helm: "fluent-bit"

minio_values:
  mode: standalone
  replicas: 1
  rootUser: "{{ minio_root }}"
  rootPassword: "{{ minio_password }}"
  persistence:
    enabled: true
    size: 10Gi
    storageClass: standard
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m
  service:
    type: ClusterIP
    port: 9000

  buckets:
    - name: "{{ loki_s3_bucket_prefix }}-chunks"
      policy: private
      purge: false
    - name: "{{ loki_s3_bucket_prefix }}-ruler"
      policy: private
      purge: false
    - name: "{{ loki_s3_bucket_prefix }}-admin"
      policy: private
      purge: false
  console:
    enabled: false

loki_values:
  loki:
    auth_enabled: true
    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    commonConfig:
      replication_factor: 1
    pattern_ingester:
        enabled: true
    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
    ruler:
      enable_api: true
    storage:
      type: s3
      bucketNames:
        chunks: "{{ loki_s3_bucket_prefix }}-chunks"      
        ruler: "{{ loki_s3_bucket_prefix }}-ruler"
        admin: "{{ loki_s3_bucket_prefix }}-admin"    
      s3:
        endpoint: "{{ minio_endpoint }}"
        signatureVersion: null
        accessKeyId: minio
        secretAccessKey: minio123
        s3forcepathstyle: true
        insecure: true
    ingester:
      chunk_encoding: snappy
    querier:
      max_concurrent: 4
  resultsCache:
    enabled: false
    allocatedMemory: 256
  chunksCache:
    enabled: false
    allocatedMemory: 1024

  minio:
    enabled: false

  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

  deploymentMode: SingleBinary

  singleBinary:
    replicas: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "200m"
    persistence:
      enabled: true
      size: 5Gi
      storageClass: standard

  ingester:
    replicas: 0
  querier:
    replicas: 0
  queryFrontend:
    replicas: 0
  queryScheduler:
    replicas: 0
  distributor:
    replicas: 0
  compactor:
    replicas: 0
  indexGateway:
    replicas: 0
  bloomCompactor:
    replicas: 0
  bloomGateway:
    replicas: 0

  test:
    enabled: false
  lokiCanary:
    enabled: false

fluentbit_values:
  service:
    type: ClusterIP
    port: 2020
    annotations:
      prometheus.io/path: "/api/v1/metrics/prometheus"
      prometheus.io/port: "2020"
      prometheus.io/scrape: "true"
  rbac:
    create: true
    nodeAccess: false
    eventsAccess: false
  config:
    service: |
      [SERVICE]
          Daemon Off
          Flush 5
          Log_Level  info
          Parsers_File /fluent-bit/etc/parsers.conf
          Parsers_File /fluent-bit/etc/conf/custom_parsers.conf
          HTTP_Server On
          HTTP_Listen 0.0.0.0
          HTTP_Port 2020
          Health_Check On

    ## https://docs.fluentbit.io/manual/pipeline/inputs
    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*.log
          multiline.parser docker, cri
          Tag kube.*
          Mem_Buf_Limit 5MB
          Skip_Long_Lines On

      [INPUT]
          Name systemd
          Tag host.*
          Systemd_Filter _SYSTEMD_UNIT=kubelet.service
          Read_From_Tail On

    ## https://docs.fluentbit.io/manual/pipeline/filters
    filters: |
      [FILTER]
          Name kubernetes
          Match kube.*
          Merge_Log On
          Keep_Log Off
          K8S-Logging.Parser On
          K8S-Logging.Exclude On
      [FILTER]
          Name         nest
          Match        kube.*
          Operation    lift
          Nested_under kubernetes
          Add_prefix   kubernetes_
      [FILTER]
          Name    modify
          Match   kube.*
          Rename  kubernetes_namespace_name  namespace
          Rename  kubernetes_pod_name        pod
          Rename  kubernetes_container_name  container

    ## https://docs.fluentbit.io/manual/pipeline/outputs
    outputs: |
      [OUTPUT]
          Name loki
          Match *
          Host loki.{{ logs_namespace }}.svc.cluster.local
          Port 3100
          Labels job=fluent-bit, namespace="$namespace, pod=$pod, container=$container
          Tenant_id default

